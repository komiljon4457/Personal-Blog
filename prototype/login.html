<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Author login — Anna's Blog</title>
    <meta name="robots" content="noindex" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/layout.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="site-header__inner">
        <p class="site-title"><a href="index.html">Anna&rsquo;s Blog</a></p>
        <nav class="main-nav" aria-label="Primary">
          <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="category.html">Categories</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li><a href="login.html" aria-current="page">Log in</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main class="page">
      <!-- BEM block: auth -->
      <div class="auth">
        <header class="auth__intro">
          <h1>Author login</h1>
          <p class="auth__lead">
            This area is for the blog author. Readers don&rsquo;t need an account.
          </p>
        </header>

        <form action="admin.html" method="post">
          <fieldset class="auth__fieldset">
            <legend class="auth__legend">Sign in</legend>

            <div class="auth__field">
              <label class="auth__label" for="email"
                >Email <span class="auth__required" aria-hidden="true">*</span></label
              >
              <input
                class="auth__control"
                type="email"
                id="email"
                name="email"
                required
                autocomplete="username"
                placeholder="anna@example.com"
              />
            </div>

            <div class="auth__field">
              <label class="auth__label" for="password"
                >Password <span class="auth__required" aria-hidden="true">*</span></label
              >
              <input
                class="auth__control"
                type="password"
                id="password"
                name="password"
                required
                minlength="8"
                autocomplete="current-password"
              />
              <span class="auth__hint">At least 8 characters.</span>
            </div>

            <div class="auth__field">
              <label class="auth__checkbox">
                <input class="auth__checkbox-input" type="checkbox" name="remember" />
                Keep me signed in on this device
              </label>
            </div>
          </fieldset>

          <div class="auth__actions">
            <button type="submit" class="btn">Log in</button>
            <a href="index.html" class="btn btn--ghost">Cancel</a>
          </div>
        </form>
      </div>
    </main>

    <footer class="site-footer">
      <div class="site-footer__inner">
        <p>&copy; 2026 Anna Weber. Built as a semantic HTML/CSS prototype.</p>
        <nav aria-label="Footer">
          <a href="about.html">About</a> · <a href="contact.html">Contact</a> ·
          <a href="login.html">Author login</a>
        </nav>
      </div>
    </footer>
  </body>
</html>
